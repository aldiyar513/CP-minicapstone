services:
  - type: web
    name: eventmatch
    runtime: python
    plan: free
    region: ohio
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eventmatch-db
          property: connectionString

databases:
  - name: eventmatch-db
    plan: free
    region: ohio
