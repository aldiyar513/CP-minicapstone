{% extends "base.html" %}

{% block title %}EventMatch | Login{% endblock %}

{% block content %}
<section class="auth-shell">
  <article class="card auth-card">
    <p class="eyebrow">Login</p>
    <h1>Access your account</h1>
    <p class="lead">Open your event feed, recurring groups, and profile settings.</p>
    <form class="stack-form" method="post">
      <label>
        Email
        <input type="email" name="email" value="{{ email }}" required>
      </label>
      <label>
        Password
        <input type="password" name="password" required>
      </label>
      <button class="primary-button" type="submit">Log in</button>
    </form>
    <p class="support-copy">No account yet? <a class="text-link" href="{{ url_for('register') }}">Create one</a>.</p>
  </article>
</section>
{% endblock %}
